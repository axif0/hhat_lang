name: rs_check

on:
  push:
    paths:
      - "rust/**"
      - ".github/workflows/rs_check.yml"
  pull_request:
    paths:
      - "rust/**"
      - ".github/workflows/rs_check.yml"

permissions:
  contents: read

jobs:
  detect:
    name: Detect Rust code
    runs-on: ubuntu-latest
    outputs:
      has_rust: ${{ steps.check.outputs.has_rust }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -d "rust" ] && find rust -name "*.rs" | grep -q .; then
            echo "has_rust=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_rust=false" >> "$GITHUB_OUTPUT"
          fi

  check:
    name: cargo check (${{ matrix.os }})
    needs: detect
    if: needs.detect.outputs.has_rust == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.90
        with:
          components: rustfmt, clippy
      - name: Ensure rustfmt and clippy are installed
        run: rustup component add rustfmt clippy --toolchain 1.90
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/hhat_lang
      - name: cargo check
        working-directory: rust/hhat_lang
        run: cargo check --all-targets --locked
      - name: cargo fmt
        working-directory: rust/hhat_lang
        run: cargo fmt --check
      - name: cargo clippy
        working-directory: rust/hhat_lang
        run: cargo clippy --all-targets --locked -- -D warnings
